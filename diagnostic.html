<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Powathikunnel — Upload Diagnostic</title>
<style>
  body{font-family:system-ui,sans-serif;background:#faf8f5;color:#2a2318;max-width:640px;margin:0 auto;padding:24px}
  h1{font-size:1.3rem;color:#8a6a10}
  input{width:100%;padding:10px;margin:6px 0;border:1px solid #d4b860;border-radius:8px;box-sizing:border-box;font-size:1rem}
  button{background:#2e1f0e;color:#f5ead8;border:1px solid #b8922a;border-radius:20px;padding:10px 22px;font-size:1rem;cursor:pointer;margin:10px 0}
  button:disabled{opacity:.5}
  .step{padding:10px 14px;margin:8px 0;border-radius:8px;background:#fff;border:1px solid #e8e2d8;font-size:.92rem}
  .ok{border-left:4px solid #2e7d32}
  .fail{border-left:4px solid #c03030}
  .wait{border-left:4px solid #b8922a}
  code{background:#f0ece4;padding:1px 5px;border-radius:4px;font-size:.85em;word-break:break-all}
</style>
</head>
<body>
<h1>Powathikunnel — Photo Upload Diagnostic</h1>
<p>Sign in with your admin email, then press <b>Run all tests</b>. Each layer is tested separately with a 20-second timeout, so nothing can hang silently. Send Claude a screenshot or copy of the results.</p>

<input id="email" type="email" placeholder="Admin email" autocomplete="username"/>
<input id="pw" type="password" placeholder="Password" autocomplete="current-password"/>
<button id="runBtn" onclick="runAll()">Run all tests</button>

<div id="results"></div>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {getAuth, signInWithEmailAndPassword} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {getFirestore, doc, getDoc, setDoc, deleteDoc} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import {getStorage, ref, uploadBytes, getDownloadURL, deleteObject} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig={apiKey:"AIzaSyBDRQr7_gfGg1tV5iv86-c7ZIzoU1GW72A",authDomain:"powathikunnel-40a66.firebaseapp.com",databaseURL:"https://powathikunnel-40a66-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"powathikunnel-40a66",storageBucket:"powathikunnel-40a66.firebasestorage.app",messagingSenderId:"698176790898",appId:"1:698176790898:web:0ad065f108fd273152fdeb"};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

const results = document.getElementById("results");
function step(name){
  const d = document.createElement("div");
  d.className = "step wait";
  d.innerHTML = "\u23F3 " + name + "\u2026";
  results.appendChild(d);
  return {
    ok(msg){ d.className = "step ok"; d.innerHTML = "\u2705 " + name + (msg ? " \u2014 " + msg : ""); },
    fail(msg){ d.className = "step fail"; d.innerHTML = "\u274C " + name + " \u2014 <code>" + msg + "</code>"; }
  };
}
function withTimeout(promise, ms){
  return Promise.race([
    promise,
    new Promise((_, rej) => setTimeout(() => rej(new Error("TIMED OUT after " + ms/1000 + "s (silent hang \u2014 usually a wrong or uninitialized Storage bucket)")), ms))
  ]);
}
function tinyPng(){
  // 1x1 transparent PNG
  const b64 = "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNkYPhfDwAChwGA60e6kgAAAABJRU5ErkJggg==";
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], {type: "image/png"});
}

window.runAll = async function(){
  results.innerHTML = "";
  document.getElementById("runBtn").disabled = true;

  const info = step("Configuration");
  info.ok("project <code>" + firebaseConfig.projectId + "</code>, bucket <code>" + firebaseConfig.storageBucket + "</code>");

  // TEST 1: sign in
  let s = step("Test 1: Sign in with email/password");
  let user;
  try {
    const cred = await withTimeout(signInWithEmailAndPassword(auth, document.getElementById("email").value.trim(), document.getElementById("pw").value), 20000);
    user = cred.user;
    s.ok("signed in, UID <code>" + user.uid + "</code>");
  } catch(e){ s.fail(e.code || e.message); document.getElementById("runBtn").disabled = false; return; }

  // TEST 2: read own role
  s = step("Test 2: Read my role document (roles/" + user.uid.slice(0,6) + "\u2026)");
  try {
    const snap = await withTimeout(getDoc(doc(db, "roles", user.uid)), 20000);
    if (!snap.exists()) s.fail("Document does not exist \u2014 the roles document ID does not match this UID");
    else s.ok("role = <code>" + snap.data().role + "</code>");
  } catch(e){ s.fail(e.code || e.message); }

  // TEST 3: Firestore write to members_v2
  s = step("Test 3: Write + delete a test document in members_v2");
  try {
    const tdoc = doc(db, "members_v2", "_diagnostic_test");
    await withTimeout(setDoc(tdoc, {diag: Date.now()}), 20000);
    await withTimeout(deleteDoc(tdoc), 20000);
    s.ok("write and delete both allowed");
  } catch(e){ s.fail(e.code || e.message); }

  // TEST 4: Storage upload to photos/
  s = step("Test 4: Upload a tiny image to photos/999999/ (20s timeout)");
  let uploadedRef = null;
  try {
    uploadedRef = ref(storage, "photos/999999/_diagnostic_" + Date.now() + ".png");
    await withTimeout(uploadBytes(uploadedRef, tinyPng()), 20000);
    s.ok("upload succeeded");
  } catch(e){ s.fail(e.code || e.message); uploadedRef = null; }

  // TEST 5: download URL + cleanup
  if (uploadedRef){
    s = step("Test 5: Get download URL and delete the test image");
    try {
      const url = await withTimeout(getDownloadURL(uploadedRef), 20000);
      await withTimeout(deleteObject(uploadedRef), 20000);
      s.ok("full round-trip works \u2014 Storage is healthy");
    } catch(e){ s.fail(e.code || e.message); }
  }

  const done = step("Diagnosis complete");
  done.ok("send these results to Claude");
  document.getElementById("runBtn").disabled = false;
};
</script>
</body>
</html>
