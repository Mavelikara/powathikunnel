<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Golden Horn of the Thornbush</title>
<style>
  :root { --paper:#faf6ec; --ink:#2b2419; --gold:#c9a24b; --cover:#3a2a1a; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#241c12; font-family:Georgia,'Times New Roman',serif;
         min-height:100vh; display:flex; flex-direction:column; align-items:center;
         padding:16px 8px; }
  h1.site { color:var(--gold); font-size:1.05rem; font-weight:normal; letter-spacing:.12em;
            text-transform:uppercase; margin-bottom:14px; text-align:center; }
  #book-wrap { width:100%; max-width:980px; }
  #book { margin:0 auto; }
  .page { background:var(--paper); color:var(--ink); overflow:hidden;
          box-shadow:inset -8px 0 18px -12px rgba(0,0,0,.35); }
  .page.--left { box-shadow:inset 8px 0 18px -12px rgba(0,0,0,.35); }
  .page-inner { padding:26px 34px 44px; height:100%; position:relative; }
  .runhead { height:30px; margin-bottom:8px; }
  .runhead.show { text-align:right; font-size:11px; letter-spacing:.18em;
                  text-transform:uppercase; color:#8a7a5a;
                  border-bottom:1px solid #cbb98e; padding-bottom:6px; }
  .page-inner p { text-align:justify; text-indent:1.4em; font-size:15px; line-height:1.62;
                  margin-bottom:.55em; hyphens:auto; }
  .page-inner p.cont { text-indent:0; }
  .page-inner p.brk { text-align:center; text-indent:0; letter-spacing:.5em; color:#8a7a5a; }
  .pagenum { position:absolute; bottom:16px; left:0; right:0; text-align:center;
             font-size:12px; color:#8a7a5a; }
  .cover { background:linear-gradient(135deg,#4a3620,#2c1f10); color:var(--gold);
           display:flex; flex-direction:column; justify-content:center; align-items:center;
           text-align:center; height:100%; padding:36px; border:1px solid #5c4726; }
  .cover h2 { font-size:clamp(20px,3.4vw,34px); font-weight:normal; letter-spacing:.04em;
              line-height:1.35; margin-bottom:22px; }
  .cover .rule { width:70px; height:1px; background:var(--gold); margin:0 auto 22px; }
  .cover .sub { font-style:italic; font-size:14px; color:#e8d9b0; }
  .cover .author { margin-top:34px; font-size:17px; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); }
  .cover .orig { margin-top:46px; font-size:12px; font-style:italic; color:#bfa76a; line-height:1.6; }
  .cover .hint { position:absolute; bottom:26px; left:0; right:0; font-size:12px;
                 color:#bfa76a; font-style:italic; }
  .endpage { display:flex; height:100%; align-items:center; justify-content:center;
             font-style:italic; color:#8a7a5a; padding:36px; text-align:center; }
  #controls { display:flex; gap:14px; align-items:center; justify-content:center; margin-top:14px; }
  #controls button { background:none; border:1px solid var(--gold); color:var(--gold);
                     font-family:inherit; font-size:14px; padding:7px 16px; cursor:pointer;
                     border-radius:3px; }
  #controls button:hover { background:rgba(201,162,75,.15); }
  #counter { color:#cbb684; font-size:13px; min-width:110px; text-align:center; }
</style>
</head>
<body>
<h1 class="site">Powathikunnel Family Library</h1>
<div id="book-wrap"><div id="book"></div></div>
<div id="controls">

</div>

<script>
const BOOK = [{"type": "p", "runs": [{"t": "The story of how Anizham Thirunal Marthanda Varma, the most powerful, skilled in warfare, and brave of the Dharmabhupalas who have ever graced the throne of Travancore, with his mind set on making complete peace for the great sin of beheading an enemy for the sake of gaining the kingdom, and since it was absolutely essential for the permanent existence, future prosperity, and prosperity of the Vanchi Maharaja's throne, the Maharaja, in repentance, invited all the scholars of Kerala to the Thiruvananthapuram palace in the year 919, to determine the atonement, is well-known to all who have read the history of old Thiruvananthapuram.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "One of those who accepted the invitation and set off for Thiruvananthapuram was the well-known astrologer Alangattu Thampuranavarkal. Along with him was a scholar Thampuran from the Kodungallur palace who had arrived at the Alangattu palace and was staying there. He was also one of the invited guests.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The lords of Alangattu have been practicing astrology and Varahamihadi Hora Shastra since ancient times.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "It is well known that they have acquired the arts of architecture, which are derived from Bhaskara. The biographies of the scholar Ilayathamburan, who died in the month of Mithun in 1026, and the poet Kochunnithamburan, who died in the month of Mithun, are sufficient evidence that the Kodungallur Thampuras were profound scholars in the Tantrasamuccaya etc. and were unique in these arts from ancient times.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The two lords, together, set out from Alangad by boat via Kodungallur to Thiruvananthapuram at an auspicious time. When they approached Kuthiya, they moored the boat for various purposes, such as buying things to tie up, drinking water, and tying ropes. The Valans went ashore.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "At this time, in Kuthiyathod, there were only the houses of the Nasrani Mappilas, the Peedikas, two or three Ezhava houses, and the Charaya Kitangu.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "When the Valans did not return after a long time, the lords, somewhat annoyed and worried, went ashore. They sent some Valans, who were repairing the poles, to the river to call their friends.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "At this time, from behind a pedestal that was slightly to the south on the eastern side of the quay, a 'Mathalla' sound and the call of a crow, indicating childbirth, reached the ears of the Thampurakas. Both of them immediately understood the story and determined the position of the Lagnadi planets, but the Thampurakas were not able to conceive. ", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Ran, astonished, gazed at the place and said, ", "i": false, "b": false}, {"t": "\"The child will become a mighty king, who will climb the mountain.\"", "i": true, "b": false}, {"t": " Shastri Thampuran said, ", "i": false, "b": false}, {"t": "\"The child will become a prostitute and take up the Kuthupala\"", "i": true, "b": false}, {"t": " at about the same time.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "In the 'old' days, it was common for scholars, especially when they had no work, to spend their time engaged in scientific discourse. Many people must have seen that when scholars and experts in horoscopes were traveling, they would ask the day and hour of some babies they saw with great enthusiasm and curiosity, and perform horoscope calculations along the way, with the aim of scientific training and familiarity.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Our travelers had also paid attention to this subject with the same intention, but only for the sake of mere amusement. But the old mutual dislike between the Alangattu Thampurakas and the Kodungallur Thampurakas, who, although they were very skilled in the science of sculpture, were not as proficient as they were in the interpretation of horoscopes, and the Kodungallur Thampurakas, who, however learned, were not as proficient as they were in the interpretation of the horoscopes. This was clearly evident in their long-standing mutual dislike of each other.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Both of them were capable of doing calculations with their minds without any help, so they made the prediction by thoroughly considering the life stage of the four-year-old child. However, since the ascendant was the same, there should be no disagreement in the prediction of the horoscope and based on the reasoning that the two lords should get on the boat and start arguing about which was scientifically acceptable. Some of the disciples of Alangadtu lord were also on the boat as listeners.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The Alangattu Thampuran must have seen in his heart that the Kodungallur Thampurans should reveal the lack of scholarly knowledge that they claimed to have in front of their own disciples and secure victory, and the Kodungallur Thampuran must have seen in his heart that the Alangattu Thampuran's scholarly pride should be crushed forever in front of his disciples. In this state, the two continued to argue fiercely until they reached Thiruvananthapuram.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Many arguments were put forward by both sides in support of their respective positions, but neither side was able to defeat the other or to advance a mutually acceptable position.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The two men arrived at the royal palace and attended the Vidwalsada, which was assembled under the chairmanship of Maharaja Thirumanas, at the Valiyakoikkal Palace. One evening, Golden Horn", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "In the presence of the Thrissivaperoor Vadhyan, the Thirunavaya Vadhyan, the Kappilingattu Vaidikan, the Cherumukku Vaidikan, the Thaikattu Vaidikan, the Pannal Vaidikan. The Kaimukku Vaidikan, the Perumpadappu Vaidikan, the Akavoor Nam Puripadu, the Ashtagrihathilaadhyanar, the Pazhayannur Nam Puripadu. The Vellarakattu Bhattathiri, the Kattumadassam Puri, the Vazhur Vadakillathu Nam Puri, the Melpazzhur Nam Puri, and the Panayappazhur Nam Puri, the Kodungallur Thampuran and the Alangattu Thampuran, who were present, stated that the arguments and arguments that arose during the dispute between the Kodungallur Thampuran and the Alangattu Thampuran had also reduced the grounds for the validity of the dispute.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The Alangattu Thampuran was also present there. He tried to prove that the Kodangallur Thampuran's arguments were illogical. In the end, it turned into a great debate that deserved the close attention of the scholars gathered there.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The Nipuris themselves split into two or three groups. Some took the sword and some the palanquin: both the", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Some also suggested that it could occur in two equal stages in the life of the child, while others attributed a nominal experience to one of the two and a long-term experience to the other. Others argued that the beginning of life, the end of life, and the taking of the sword. The middle stage of life was the taking of the sword. However, even the scholars present were unable to refute or establish either of the two, the suggestion of the eternal fruit experience of the masters, who had assigned eternal life to only one of the two.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The criticism of the horoscope in the voice was finally put to an end by the old Thirunavaya Vadhyan, who had finally reached a calm state and since the real illusory result of the horoscope is only experience, if both of them write two horoscopes as they are convinced and hand them over to the father of the child, the feelings and experiences that are continuously revealed in the child's life stage will reveal the reality of the horoscope in a way that everyone gathered here can understand at once, thus bringing the argument to a close.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The scholars who attended the Vidval Sabha held at Valiya Koikkal, having prescribed two rituals for the purification of the sins of His Majesty the King, namely, Bhadradeepam and Murajapam, returned to their native lands.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Our horoscope makers, on the other hand, moored their boat at the old pier in the stream they had dug on the way back, brought the child's father, asked him a few questions about the child, and then handed over the two horoscopes to him. Before continuing their journey, the Thampurakas ordered that they should keep them very safe, as they would need to see them themselves at some point.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Thus, this child, who became the subject of the profound contemplation of two horologists and scholars in Kerala, performed the same act of piercing and biting in his lifetime, and within the time-frame", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The famous Rajasek Kanaya, who was hiding, was a thief.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Tharakan's father, Tharathumappila, was an honest and trustworthy merchant. He had earned enough money through trade to spend his time without much difficulty.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "At that time, Alappuzhapatnam had only nominally earned the title of a commercial center.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "In 151 AD, some of the Gaudha Saraswata Brahmins, fearing the atrocities of the Portuguese governor Alfonso de Albuquerque, had reached places like Kochi, Alappuzha, and Thuravoor with the emerald amulet, the divine idol of the present-day Lord Thirumala, and had started a fairly good business in the present-day town of Alappuzha, at the site of the old Malikakkada. Many important merchants of that time were trading with Harishenai in Kochi and with Rangasenai in Alappuzha.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "It is also known that Rasenai was a great pious and great-minded person. Some of his descendants have heard that when a long-standing fire broke out in the southern part of Alappuzha, the fire spread rapidly from the west to the east, and all the goods in the shop, including rice and sugar, were scattered among the poor as a gift. Out of religious fervor and the grace of God, the fire was extinguished by the time it approached the shop.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Taryathumapila was a great asset to Rangashenai. Because of his extraordinary kindness, honesty and integrity, he happily agreed to take goods on loan as needed. Sometimes Rangashenai would send Taryathumapila to distant places for his own affairs. He would perform such tasks very well and return home. Over time, the friendship between them grew and Rangashenai helped Taryath considerably in acquiring certain things...", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The young Mathutharakan, after learning Tamil Malayalam, Tamil grammar and some Sanskrit, was trained by a Panicker, a close relative of Taryathumappilla. Panicker's son Kunchapanicker and Mathutharakan had grown up playing together, and Kunchapanicker had shown loyalty and obedience to the wishes of the tall and strong Mathutharakan. They had lived together for a long time.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Sometimes, Mathuvin used to take Taryathumappila to the Alapuzha river. Rangasenai and his younger brother Nara Yanasenai felt immense joy at that sight.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "At this time, Taryathumappila also faced the need to leave the shop and go abroad for farming.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Mathutharaka was forced to stop training in weapons and was kept in a shop. Around this time, Tharaka also got married. The thought of what his son's future would be like often troubled Tharaka Mappila and his wife.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Since it was not possible to predict the circumstances of their son's death through dreams, those parents often feared that the time would come when he would only take the throne. However, Taryatumapila did not get to see his beloved son take the throne as a courtier or become a great lord, and he passed away around the year 935.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Mathutharakan was sixteen years old. Kunchapanikar was the young man's main assistant and advisor in all matters of business, agriculture, and so on. Some other people, who were also painters, gathered around Tarakan in a dependent manner.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The young man, who had never known the difficulties of making money or the hardships of life, began to gamble with the money that came easily to him. Within a short time, he was captivated by the seductive charms of the goddess of evil. Gambling, drinking, serving women, feasting on alcohol, and why not, he destroyed the things that Mappila had earned in the first place.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Although the mother, fearing her son's displeasure, had initially said nothing, she eventually found it impossible to avoid scolding her son. Whenever she started to say something, the boy would forget the story and start crying. But they were helpless.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "From time to time, Tharakan's father-in-law came there and, with great pain, criticized and reprimanded the young man for his lack of intelligence and his addiction to alcohol. No matter what, his son-in-law did not seem to be able to do anything about it, so one night, he arrived by boat, called his starving daughter out with a basket, and took her home with the permission of her mother-in-law.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The story of the wife leaving the house was only known to Tarakan after about a week, and Tarakan and Aneshan were only concerned about it. Tarakan was very angry with his mother for sending his wife to their house without telling him. They said one thing or two to each other, and the matter ended in a big fight.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "One day, thinking that her son's condition was such that staying in Thachil was no longer a good idea, Tarakan's mother left. She went to her brother's house.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The house and the shrine of the saint were empty. The coffins and bronze vessels were handed over. The devotees and the hymn-readers were all present.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The pot was full, and the stove was covered with cobwebs. Only the mother and her leaky roof remained. Since the house where they lived was in their mother's name, the creditors could not swallow that alone. Shortly before moving to the brother's house, they had even leased it to a neighbor.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The poor man is starving. Even if there is a meal or a drink in the morning, there is no one at home to give him food. The poor man is only able to carry a piece of wood because Kunjupanikar, who is the only one who gives a piece of food from his poor house, gives it to the poor man without anyone knowing. Due to hardship, hunger and humiliation, the young man, who has no clothes to wear, spends his days locked up and does not go out. Kunjupanikar has been missing for three or four days.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "One night, Tarakan felt extremely hungry, thirsty, and in great distress. Seeing no way out, he took a torn black cloth that was lying there and, covering his head and body, walked south for about an hour. He reached the house of an unfamiliar Konkani Brahmin and begged once or twice, saying, ", "i": false, "b": false}, {"t": "\"Mother, please give me some supper!\"", "i": true, "b": false}, {"t": " in a voice that had changed.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "After some time, a young woman adorned with gold ornaments came out onto the verandah with a ladle full of rice and curry. She asked, ", "i": false, "b": false}, {"t": "\"Do you have a bowl?\"", "i": true, "b": false}, {"t": " Tarakan replied, ", "i": false, "b": false}, {"t": "\"No.\"", "i": true, "b": false}]}, {"type": "p", "runs": [{"t": "The young woman answered. ", "i": false, "b": false}, {"t": "\"There is a blanket lying there for the oxen's food, bring it here,\"", "i": true, "b": false}, {"t": " said the young woman, and the hunter groped in the darkness. ", "i": false, "b": false}, {"t": "\"He reached the oxen's food and took a new blanket that was lying there with the straw, cut it with the sword he had on his waist, and folded it into a blanket. He bowed his face.\"", "i": true, "b": false}, {"t": " He went forward and approached, received alms, and hid in the darkness.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "In a short time, he reached home, took a bath, took alms food, and since there was no lamp, he placed it in a place where the skylight would shine. With the intense mental anguish and the current of evil that arose from remembering the situation at that time, he rolled a ball and put it in his mouth. ", "i": false, "b": false}, {"t": "\"Oh God, don't let Kunjupanikar come here and see all this!\"", "i": true, "b": mething.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "He also told me to bring my wife along and stay with her so that she could prepare the food.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The young man's conversion and repentance lit a small lamp in Kanchipannikar's heart. He immediately imitated Taraka and vowed, taking God as his witness, that he too had resolved to spend his time worthily from now on, and that he wished to go somewhere together and spend some time doing physical exercise.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Kunjupanicker opened a cherry wrapper he had and placed it in front of Tharakan. It contained some flowers and fruit that he had brought from his house nearby, which he had brought with him. The two of them, with a new mindset, decided to eat it and then set out for Tharakan's in-laws' house with him that very day.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "But since Tarakan had no other clothes, washed or unwashed, other than the single, dirty, black garment he was wearing, the two of them began to think about the means of their journey. Seeing no other means of fulfilling their purpose, Tarakan's mother took a hundred-pound pot (limestone pot) that she had forgotten to take with her to a nearby white-clad Nair's house, pawned it, and bought it 'to wear and tie'. In the afternoon, the two of them set out for Tarakan's wife's house.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "A special type of clay used for making mortar and pestle.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "It is also necessary to state on this occasion that such hundreds of pots are not found in the homes of any other caste in Kerala, except in the homes of the Kerala Nasrani.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Tharakan and Kunchapanikar reached Tharakan's wife's house in the evening. Although Tharakan had been there for a long time, no one there seem iation, shame, and intense anger, the small weapon, which was as strong as steel, crumpled and crumpled in his grip, crumpled and crumpled against the wooden planks.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Kunju Panicker finished his meal and came to the porch with a lantern. Tharakan did not move either. He was just a mere creature: his body and face were stretched out in unison, and the sweat was dripping down his face. Kunju, Panicker approached and asked, ", "i": false, "b": false}, {"t": "\"What is it, what is it?\"", "i": true, "b": false}, {"t": " Tharakan, unable to answer, raised his head and straightened his spine. 22", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "He let out a long, hot breath from the stream. The lamp was lit instantly, and after a while they whispered something to each other. He wondered if Tarakan had fallen asleep. He tilted his head slightly.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The east was covered with water. The sun was shining. Early in the morning, Kunjupanikar went to the head of the household. He said that it was time for them to go and that Mariyakutty should be sent with him. 'You don't have to say that one thing,' Pilolo Mappila retorted. Kunjupanikar tried to persuade his daughter to go with the farmer by giving her reasons and logic. When nothing seemed to work, Panikar went out and secretly told Mariyakutty that the girl should stay in her husband's house no matter what, and that if she did not feel sorry for her husband's plight and acted only for her own pleasure, that would also be a cause of God's anger, and that she should try to go with them no matter what.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "In response to this, Mariyakutty said a few words in a tone of sorrow that she very much wanted to marry, but that she did not have the freedom to do anything against the wishes of her parents, and that she was deeply saddened by the plight of her husband.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The carpenter came to the platform on the east side and said, ", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "\"But please allow us to go,\"", "i": true, "b": false}, {"t": " he said to Mappila as his last words.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The head of the household said, ", "i": false, "b": false}, {"t": "\"If you are going, let him go. If the shopkeeper has spoiled his drinking cup and his beer bottle, it will be dangerous.\" Don't go now. Just leave after a week. Let's play with time. Let's try to arrange it.", "i": true, "b": false}]}, {"type": "p", "runs": [{"t": "Maria Panicker - Don't force me just this once. Let's see if I can come soon. If we don't send the child too, it will be a great debt to us. Without saying anything else about it, it would be better to send our daughter too.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The householder - a word about that matter", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Don't say anything. Let's leave the matter of Mariyakutty alone. When he is qualified and has the oath to take at least the maidservant here, let's think about sending Mariyakutty. Beyond that, don't say a single word about that matter.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The last words of the householder completely destroyed the patience of this rascal. The young man finished the whole conversation. In an instant, he stuck a small piece of wood into the plank and, pulling it into his hand, rushed to the roof with it around his waist and said with an angry expression, ", "i": false, "b": false}, {"t": "\"You, father, mother, and your daughter, come to my house and accept this daughter of ours.\"", "i": true, "b": false}, {"t": " ", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "\"The rising sun and the Kunchapanikars standing here are witnesses to the fact that I will not accept your daughter, see her or step over this fence except at that time, and that is the time when you will take her hand and put it in my hand,\"", "i": true, "b": false}, {"t": " he said in a solemn tone, and went out onto the steps. The Kunchapanikars also followed him. When parting, the head of the household called him near and presented him with a southern robe and a sling to 'wear and tie'.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The two friends arrived at the house. A discussion was held about the next step. Panicker was of the opinion that it would be good to start a small business. But where is the money? Panicker had encouraged his friend by saying that if he went to the house of his mother and met him and his mother and told him about Tharakan's new life and aspirations, they would not give up on him. Panicker encouraged him by saying that if Tharakan used the turban and slingshot he had received for the journey to the house of his mother, it would be a success. But Tharakan was afraid to go before his mother, who had repeatedly reprimanded him for his immoral behavior. In any case, the next day, Panicker insisted that Tharakan go to the house of his mother. He said that he would leave in the morning.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "That same night, a boat pulled up to the dock shortly before midnight. A man got out of it, went to the door of the house in Thach and started shouting ", "i": false, "b": false}, {"t": "\"Tharakam Na\"", "i": true, "b": false}, {"t": ". He realized it was his mother's voice.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Then, along with the Kunjupanikkar, he set out for the Alappuzha mall.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "When they saw the young man, the faces of Rangasenai and Narayanasenai suddenly changed. They were fully aware of all the troubles that Mathu had caused after the death of Taryathumappila. In particular, Tharakan's maternal uncle had expressed his sorrow to Rangasenai and his brother, who were going to Alappuzha, about Tharakan's suffering. On the occasion", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Ranga - Have you come to buy goods?", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Tara- Same", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Ranga- Where did the money come from? Didn't you sell the robe and destroy it? What a pity! You felt like doing this. Do you have any idea how much help you have received from here in purchasing all those things and how much love and trust you and Taryatmapilla have spent with us? The loss of Taryat is like the loss of our right hand. We were amazed by Taryat's loyalty and ability to do everything so beautifully when we sent him in our name. What a shame, you destroyed his property and family. Do you want to do business here with you, who are so arrogant?", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Narayana Shernai - You are not worthy of even the smallest amount of food on this plate. You are both a fool and a sinner. You have four kashuns.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Do you know the pain and hardship of being a mother? So there is no need to be here with you. You prefer to lie, walk around, and bathe in Diwali with whatever you have. Otherwise, you will not be able to walk in the same situation as the boys.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Rangashenayai- I am not saying this out of spite towards you. When I remember the matter of the loss, I feel so much pain and sorrow. It is not at all pleasant for us to see the property and family of someone we loved, trusted and respected destroyed and his son walking around like a scoundrel and a scoundrel. If everyone sleeps well, it will be good for everyone. Ain", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Mathutharakan, without answering, looked down, his face bowed. His eyes were filled with ominous thoughts. Tears flowed down his cheeks and fell abundantly on the bowl of water that was placed in front of him.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "After a few moments, Tharakan humbly said in a broken voice that he had suffered enough of the consequences of his foolish actions, that he had sworn before God, touching his mother's feet, that he would never do that again, and that he had decided to start a small business with the money his mother had bought by mortgaging the land he lived in and live a decent life from now on.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Rankara- Well, if you were to bring something from here, would you be able to transport it properly? Or is it mandatory for you to conduct business?", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Thara- I am happy to carry out any task entrusted to me from here.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Ranga in the mountains - But you should go to Achankovil and cut down the trees that we have been allowed to cut here by the government and bring them down. What can you do?", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "It's raining. When should we leave?", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "600 Ranga- The fifth batch is due to leave today. Go home and ask your mother for permission and bring it. Keep the money you brought here.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Tarakan handed over the money to Narayanasena and returned home. Tarakan and his friend believed that God had taken care of them. The two of them reached home, informed their mother about the news, and after taking permission, returned to the mansion.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "On the exact day, at an auspicious time, Tharakan and Kunju Panikar, together with Rangashenai, bought some money and two coins to cover their travel expenses and to throw the phool, and set out for the Achankovil hill.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The Konni and Achankovil mountains were ten times more dangerous then and now. In the vast, terrifying and dark forests, the terrifying cries and screams of the animals could not be heard.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Crossing the river and cutting down trees was not something that could be done by ordinary people, except by brave, courageous men. Anyone who is passionate about life will be shocked to hear about it.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Tharakan and Panicker reached Mavelikkara and with the help of some people there, they continued their journey by taking a few axemen. On the seventh day, they reached Achanko Vill and, in order to fulfill their purpose without any danger and to receive the blessings of God, Panicker made some offerings to the Achankovil Shasta and Tharakan to the Omallur Church. It is said that Tharakan gave the Ottumani of the Omallur Church and some bronze vessels from the Achanko Villambalam. Mathu", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "In about a month, about two thousand five hundred trees were cut. When we say cut, we mean to cut a mark at the base of the requested trees, two feet long and two feet wide. The necessary facilities for cutting down the trees would also be provided. No one else had the right to cut these trees. No one would have cut them themselves.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "After the completion of the work, all the money in Tharakan's possession was gone, so he left the work to that extent. Tharakan reached Alappuzha and met Rangassenai and told him the stories. He admired Tharakan's enthusiasm and courage.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The joy and trust expressed were filled with joy. The woodcutter, who had been paid for the felling of the tree, was sent away for the second time.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The work of cutting down the trees, cutting the branches, and preparing the branches for elephant work is one of the most difficult tasks. Tharakan had taken as many workers as he needed from Mavelikkara to this place on this journey. Tharakan completed this work within three months.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Since the money they had was running out by then, and they had to make arrangements for the elephant work, the carpenter and the carpenter set out for Alappuzha again. This time too, the journey was smooth, and the money requested was handed over to the carpenter. Since it had been a long time since they had left home, the two of them stayed at Kuthiyathod for a day or two, and then set out for places like Kottayam, Ettumanoor, Vaikom, etc. to arrange for the elephants.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Within about a month, thirty-five elephants, their mahouts, and the necessary workers arrived at Achankovil. It is needless to say here that it was a difficult task to transport ten thousand huge teak logs of various types, worked by elephants, and then to a convenient place six miles away.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The brave and steadfast Tarakan did not tire me at all and completed this work within three months.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The work was done beautifully. By this time, the money to pay the workers had run out, and some of the workers had fallen ill and died, but all the workers had been kept together. The carpenters and the workers returned to Alappuzha, while the others returned to their native places.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "It was a good thing for the farmer that if he had cut down the wood and worked as an elephant and endured the hardships of bringing it to the place where it was brought, he would have been able to reach the two thousand five hundred logs in Alappuzha. How many people, how many canes, how much precision, how much patience, etc., are still needed.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "If at least twelve logs were to be handed over to each person, ten to thirteen hundred men would be required to unload the logs. If the six men did not stay with the six men at the six-thirty-fourth bridge, all the logs might be lost in pieces. Therefore, Rangashenayi told Tarakan that unless he paid close attention to this last point, all the effort he had put in would not be fruitful. Tarakan replied, ", "i": false, "b": false}, {"t": "\"The Almighty will make everything right.\"", "i": true, "b": false}]}, {"type": "p", "runs": [{"t": "In order to gather the necessary men to lower the wooden rafts, he sent one of his men to Mavelikkara and, after collecting the money for the expenses, asked the carpenter Kunju and the workers to come and get some experienced rafters.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Together with the others, I returned to Mavelikkara by boat.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "As soon as the journey began, the rain had already begun to fall. By the time they reached Karimpalavalav, the sun had set. It had also begun to rain. The heavy rain and the storm had added to the terror of that night. The captain ordered that the two boats should be left at dawn, so he tied the boat to a small reef he had found nearby.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The whole night the rain poured down heavily without a break. It seemed as if both the boats might break apart due to the constant clashing of the waves. There was no lack of wind and storms. No one was afraid of death, waiting for the morning without any hesitation.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The morning dawned. Everyone raised their umbrellas and looked around. Tarakan, too, looked south at the young man who had once taken the sword. Like the procession of the goddess of great fortune, who was about to bless her forever, the mountain torrent, which was rushing and rushing, was like a stream of water, rushing and rushing. Countless large teak trees!", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "At first glance, the carpenter was very surprised. However, when he saw the name 'Rangasenai's carpenter's name written on the logs, tears of joy welled up in the carpenter's eyes. The workers in the boat immediately jumped into the water with their boats and 33", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "All the timber was tied up and pushed to the cliffs. The necessary people were also brought there to help. In the meantime,", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "By noon, the two thousand five hundred Chilwanam logs that Tharakan had placed in six piles had arrived there in a single night's flood. There were many other types of logs besides the teak logs.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Rangasherai and Narayana Shenai were very happy to hear the news. The next day, Rangasherai reached there in the afternoon. He returned very satisfied after seeing the piles of wood lying there without oil.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Within two months, he had removed some of the timber for his own needs and sold the rest of the timber to 'Govindaji Naoroji', a prominent merchant in Bombay at that time, for a large sum. Of this, the amount spent on felling the timber was set aside with interest for the entire period, a small portion of the remaining amount was taken as an offering to the Kochi Tirumala Deva, and the remaining eight thousand five hundred rupees, which Narayana Shernay had bought from Tharakan when he was going to collect the goods, was also placed in stacks in front of the young man for Tharakan to take. In addition to this, he also gave him two hundred and fifty stumps of timber for the construction of the house.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Anantham Rangasher, the reward for his efforts and hardships, said to the donor: - 'This is all yours and yours alone. Therefore, you have the right to this. This amount will be more than enough to live a worthy and honorable life. If you behave badly, God will punish you severely for us, as your responsibility has increased. Only now can we give you anything to compensate for the sorrow that Taryatumapilla has endured that it is not ours. Do not tarnish the good name of Taryatumapilla any further and try to spend your time doing something honorable. Since this is money earned by risking your life in the mouths of wild elephants and tigers, there is no need to say more about how to use it properly.'", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The words of the great and noble Rangana Sreenai made Mathutharakan wander in a dream world for a while. His steps were very confused due to his various emotions. For some time, Mathutharakan stood there without strength to reply even a single word. He was overwhelmed with gratitude and joy. The young man believed with all his heart that the Almighty God had blessed him completely.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "After receiving the money, Tharakan, with great reverence and respect, greeted Rangasenai and set out for the fort with the workers. Within a few daysGolden Horn", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Those two hundred and fifty pieces of wood also came together in the Kutiyatham grove.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "First, Tharakan built an eight-meter house and a padipura mansion on the site of the old house where he had paid off his debts. He also built small buildings for it. Not far away, he bought a plot of land and built a four-meter house and a hut on it and gave it to the Kunchapanikars.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Tharakan's endless effort was to cut and bring down timber from the banks of Periyar and the Ranni hills on his own. With the permission of the government, Tharakan was able to do this too. With that single trade, Tharakan became immensely wealthy.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Meanwhile, Tharakan, who was trying to convince the young man to settle down in Alappuzha, bought some more land in Thathamballi, built the necessary buildings, and started trading there. The goods he traded were metals such as gold, silver, copper, and iron, various types of silk, coal, war materials, spices, and wood.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "With the intention of facilitating trade, Tharakan first purchased a ship from Bombay. This ship, along with another ship of Tharakan, was captured by Veluthampi Dala and Ramalingam Pillai, who had become Mathutharakan's archenemies, in the month of Meenam in the year 881. 36", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "They made up excuses and sold it. Below is an old Tamil song praising the glory of the shipbuilding industry.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "(Only a few parts of the song. The whole is a prayer)", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "(Ship song)", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "\"Vadarkulashai Nagar is mine--the city is mine, let us take this to the temple of Mary--the temple is the flagpole, let us take this to the temple-\"", "i": true, "b": false}]}, {"type": "p", "runs": [{"t": "There is also sympathy in the sky-", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "He is the flagpole", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "There is also Anup", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "(Taruli)", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The wise men of the land, the wise men of the land, are the ones who are the food of the ships of the coun arakan thought that it would be best to make a small horn of the king Nana made of pure gold and display it in front of the temple. Kunjupanikar agreed.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "A large silver pedestal, about three-quarters of a cub high and correspondingly long, with a mahout standing outside, holding the tusker and the tusker, and another mahout holding the tusker on the lower side, placed it in a beautiful silver box, decorated with first-class gold, and the two of them returned to Thiruvananthapuram.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "It is necessary to say a little here about the practice of showing off one's face at the expense of position and honor at that time.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The person who is to show his face will be present at the place specially designated for that purpose in the palace a little before the exact time. There will be the young king, the dalawā, the sarvadhikāryakar, the great superintendent. The chief tahsils, the commanders, the tantri of the Sree Padmanabhaswamy temple, the koovakkara pori, the important thampis, the koil thampurakas related to the royal family, the desavazhis, the harikars, the pattakars, the vellitikars, the pattukudakars, the baanakodikars, the mardaras, the vethikars, all in their appropriate attire. While the Maharaja, adorned with gold ornaments and accompanied by the pattakars and sobudaras, will wait for the esunullam of his Majesty, the esunullam will depart from there. At this time, the Maharaja will be standing in front of a huge wooden gate, which has been made into a strange structure called the Atiyarvathil, opposite the person and things being presented to him. On both sides are two rows of pillars with the above-mentioned people standing on either side.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "As the person who was supposed to show his face on this occasion, following the orders of the authorities, approached with a stern look, a silver-clad man standing in the doorway knocked the authority to the ground and shouted, ", "i": false, "b": false}, {"t": "\"Be careful, be careful.\"", "i": true, "b": false}, {"t": " ", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "\"You must be careful. You must be careful. You are in the presence of the king, you are in the presence of the great Khara Perumal, you are in front of the three eyes of the God who is seen, you must be careful, you must be careful, you must be careful.\"", "i": true, "b": false}, {"t": " They will shout in a loud voice. If a person is a madman, half his life will be lost just by hearing this.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The venerable seer approaches the king, bows down, offers his offerings on a silver plate placed in front of him, and then bows down again several times before the king. If there is more than one person to show his face at the same time, the venerable seers of all of them are arranged in a row, and the great king, standing facing east, first touches the instrument placed first on his right side with his mind and hands. Only then can the offerings be touched.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "After touching him in this way, he will call him Thampi, Chembakaraman, Thampi, Chembakaraman, Valiyathan, Thandanan, or Madhalali, according to his personal circumstances and the person he is addressing, only once, and the officials present at that time will repeat it three times out loud. After this, the Supreme Authority will use that title as a succession. ", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The extension to the palace, the main machinery in the palace, the rights of four legs, eight legs and eight legs, etc., are honored by him. Send and send", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Mathutharakan arrived at the palace at the right time with Thirumulkazhchaiya. To show his face to the famous Mahamadiya lord, a son of Pokku Mussamarakar had also arrived there. Thirumulkazhchaiya brought a golden bowl, a bowl of rice, made by a carpenter, on a pole.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The Marakkars had thoroughly influenced the Supreme Commander and the Dalavans to accept the Maharaja's proposal with his heart for the first time.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The Maharaja, as usual, stood at the entrance to receive the offerings, and the Supreme Commanders invited the woodcutter to come forward first to receive the offerings. He took out a silver-worked box, opened it, took out a golden lotus, and presented it before the Maharaja in a state of peace. The Supreme Commanders invited the carpenter second. The carpenter came forward and placed the box in a state of peace. From it, he took the golden branch with the pedestal and placed it on top of the box and presented it to the Lord.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Thus, the Maharaja of Marakkare Kadalivazha was placed on the right side in front of the king and the golden cup of the king of the king was placed on the left side. But the position given by the Sarvadhi Karyakar to the elephant, which is one of the royal emblems of the Travancore royal family and one of the royal symbols, was not at all satisfactory to the Maharaja. His Majesty felt that it was his duty to give the elephant a place on both types of fronts. As a king, the honorable His Majesty immediately ordered, ", "i": false, "b": false}, {"t": "\"Whose banana is it? Take it from there and put it away.\"", "i": true, "b": false}, {"t": " This was a clear blow to Marakkar’s heart. The Marakkar, overcome with grief at having become a vessel worthy of His Majesty's displeasure, and in confusion at not knowing where to put it, was in deep distress. ", "i": false, "b": false}, {"t": "\"If you don't take it, the elephant will take it away,\"", "i": true, "b": false}, {"t": " the brave Tharakan said without hesitation.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "On the occasion of Karthikathirunal Ramavarma Maharaja was overjoyed at the wisdom of the wise man, who had decided that this was the most appropriate gift to present to the King Hamaya, and at his reasonable and timely sweet speech, and he ordered three times, ", "i": false, "b": false}, {"t": "\"Mathutharakan, the owner, Matthutharakan, the owner, Matthutharakan, the owner,\"", "i": true, "b": false}, {"t": " and the officials", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The king chanted the mantra three times. With his mind, he immediately tied a chain of warriors to Tharaka's right hand and a rope to his left. He ordered Tharaka to be mounted on a horse and paraded around the city.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "In this way, an ancient poet has described the journey of Tharaka from Thiruvananthapuram to Thathamballi as follows:-", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "*A mortal who was famous throughout the place", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Know that Kochumathu Rakan is the perfect, the powerful, the most powerful among men.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Be gracious", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The wisdom, strength, and courage of the Pharisee are very much appreciated.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Without even this much sense of duty, the lord of the land of the forest, who is said to have ordered a good palanquin, a good palanquin, and good men, who are worthy of riding on a palanquin, to be adorned with many garlands. He was dressed in pure silk, and over that he spread a very fine garment, and took out a gold-embroidered veil, and tied the veils on his head with a garland, and put on bracelets in front of his hands, and a golden cape on his hands, and when he had tied the chains around his face, he said, ", "i": false, "b": false}, {"t": "\"Mangalasundaran, what a beautiful man he is.\"", "i": true, "b": false}]}, {"type": "p", "runs": [{"t": "When Tharakan B reached Alappuzha, he first went to Shernai's house, took off the chain of warriors that was lying on his hand and bowed down at his feet. Shernai, in turn, placed the chain of warriors and two golden kaps belonging to him on Tharakan's hand and sent him away with great honor.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Hearing that her son was coming to take the Veerasringkhala from Ponnu Thampuran and mount his palanquin, Tarakan's mother was waiting on the steps to see his arrival. As soon as Tarkan saw his mother, he got down from the palanquin, took off the Veerasringkhala and bangles from his hands, offered them at the feet of that blessed mother and prostrated himself. The mother, overwhelmed with joy, bowed down with all her heart to the most merciful Jagadishwaran and blessed Tarakan.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Mathuttharakan's fame spread throughout the land. All those who had previously slandered him now became devotees of Pada.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "One day, after dusk, Tharakan's mother, Viyappan Pilomappila, along with his wife, daughter and a few servants, arrived at Rangashenai's house by boat. While Shernai's wife understood the story, invited the women to the other side and treated them respectfully, Pilomappila told Shernai all the stories about how Mathutharakan and the workers had come to take Mariyakutty away and how they had finally taken an oath and returned.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Since it was doubtful that Mathutharakan would accept their poor daughter as his wife, he asked for help in this matter. He also begged for forgiveness.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Even after thinking about the brave
