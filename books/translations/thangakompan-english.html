p", "runs": [{"t": "Like a burning pain in the heart, every word of the silver arrow began to hurt the hearts of Pilomapilla and his wife. Due to shame and despair, their Vagana", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "His face turned pale. Meanwhile, Mappila couldn't help but wonder what would happen if he returned without seeing Tharaka. He couldn't help but realize that all the Chellivillars' verbal abuse had come with Mathutharaka's arrival.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Kunjupanicker came there at this time and did everything. He saw Pilomappila and others and took him upstairs. Mathutharakan appeared to Pilomappila reading something, standing near a hanging bed with a mattress spread over it, leaning against a lamp.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "After a long time, seeing that Tharakan had stopped reading, Kunju Panicker said to Thakan, ", "i": false, "b": false}, {"t": "\"Didn't you see that Mariyakutty and others have come?\"", "i": true, "b": false}, {"t": " Thakan replied indifferently, ", "i": false, "b": false}, {"t": "\"What do I want for that?\"", "i": true, "b": false}, {"t": " and returned his attention to the book. After a long time, seeing that Tharakan had broken the silence, Pilo Mappila and his wife took Mariyakutty to Tharakan, held the trembling hands of the shy girl together, and placed her in Tharakan's right hand.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Then the woman, in spite of herself, said: 'My mother is a child, just like my child, whom I gave birth to and raised. If we have acted unwisely in our own best interests, Golden Horn", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Isn't it worth forgetting everything? We have no choice but to live our lives seeing you both living happily together.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "\"'What's the problem with that?' said the old man.\"", "i": true, "b": false}, {"t": " Before he could finish, the servant came and invited Pilomapilla, his wife, and his daughter to the bathhouse, and they all went downstairs.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "After a few months, Pilomapilla stayed there for a few more days and then returned to her own house, accompanied by her mother-in-law. In a few months, Mathutharakan rebuilt the house of his wife in a manner befitting his dignity and connections and acquired property for the family. But as a punishment for Pilomapilla and his wife for their reckless actions, Tarakan did not forget that the old wooden pillar, which he had once driven out with pride and bravery, and the crack on it, was placed in the porch of the new house for everyone to see.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "That one crack, deeply embedded in the back of the head, was a manifestation of a lifelong, unspeakable wound in the hearts of Pilo Mappila and his wife.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Our hero Mathuttharakan presented a golden horn to Dharmaraja in 943.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The Maharaja, who was the object of his love, respect and admiration, continued to be his devotee, faithful servant and advisor. The thirty years from the time of his ascension to heaven in the year 973, up to the 6th day of the month of Kumbha, were the zenith of the glory of Matha Taraka. During this time, all the important things that the Maharaja undertook with his mind were done with the advice of Diwan Raja Kesavadas and Matha Taraka.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "It is not necessary to mention here how much Mathutharakan and his money helped in raising troops for Ponnu Thampuran and in covering the expenses of the war against Tipu.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "If the key to the money box of the wealthy Mathutharakan had been tightly held in his little finger, what kind of country and what kind of government would it be today? The readers can only imagine what kind of headgear would be worn on the heads of some of the people who walk around in a hurry. In all the occasions when the Maharaja has been penniless, Mathutharakan's devotion to the kingdom and his money box have become the sole support and source of love for the Maharaja.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Raja Kesavadasan, a political activist who sacrificed his life for Travancore, was a close friend of Tarakan. ", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The suffering of Kesavadasa and Taraka began with the attainment of the afterlife in the mind of the king. But like the wick of a lamp about to go out, at this stage, the wick of Mathutharaka's lucky lamp is extinguished, and Taraka falls into darkness as if the final light has been extinguished. ", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "One of the two main reasons for Mathutharaka's downfall was the overwhelming power of his royal service. This power helped him more than anything to rule the kingdom according to his wishes.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The extent of the role of the governor in the administration of the kingdom is abundantly revealed by the following excerpt from the Malankara Syrian Church history book.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "974-year-old Valiya Diwanji passed away in the month of Meenam. After this, since the previous 72 years (972-year-old), Neelakandan Chembrapillai Karya and Mathu Tharakan had not been able to reconcile, so Tharakan went to Thiruvananthapuram, gathered the necessary people, and suppressed the dispute. He gave a large sarvadhi to a village north and outside the Vichara and a large inscription to Pankara Narayan Chetti. He brought Chembrapillai Karya and put a seal on it and made many hardships. He confiscated all his property and took it away. He had done this by collecting a lot of land and when he heard that Govarnadora had passed away in the year, Tharakan came to Pandara and when Paulus the Bishop came Thatchil Mathutharakan", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "It was decided that when the affairs of the state and the affairs of the country were carried out and conducted as Mathutharakan pleased, the previous plan would be achieved (Putthankuru Malankara Syrians could be brought under the control of a pope). The property of the great lords of Namburi was written to the great lords of Mavelikkara by the great lords of Eswara Pillai, stating that two of the properties belonging to the Chembra Pillai officials (the large chest belonging to Bishop Marthoman Dionysius) were sitting on the roof and that they should be confiscated and seized, that there was a lot of wealth in Niranth, Chengannur and Puthenkavu, and that these three churches, which belonged to the bishop, should be confiscated and seized. On the third day of the month of Edava in the 74th year, the Niranthu church and the Puthenkavu church were found, tied up and guarded.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "If we consider the financial assistance provided by the Maharaja, even before the existence of the Travancore kingdom, to meet every need, we cannot find much reason to criticize his arbitrariness. It should not be forgotten here that in the past; the entire administration of kings and officials was arbitrary.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The festivals of Thaya Thirunal, Thiruvantheli, Thirumasam, Nyagarbhatanam, Tulavarshadanam, Murajapam, and Pujayadiya were held from 935 to 970 AD. Golden Horn", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Mathutharakan was to receive fourteen lakh rupees from the government in debt relief for the following items: ", "i": false, "b": false}, {"t": "\"The cost of building the palace, the cost of the war, the tribute to the English, etc.\"", "i": true, "b": false}, {"t": " (The cost of paying the merchants for the war, etc.) and ", "i": false, "b": false}, {"t": "\"The amount of money borrowed from the merchants for the war, etc.)\"", "i": true, "b": false}, {"t": ". (See paragraph 3 of the petition sent by Mathutharakan's grandson to the Governor of Madras)", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "During the reign of Balarama Varma Thirumeni, the Karthika Thirunal period, Travancore had become a hotbed of rebellion. During this time, brave and manly; In order to seize the vacant office of Sarvadhi, which was a matter of pride, the younger brother of Rajakeshavadasa Thampi Chembakaraman, who was the legal heir to the throne, had fraudulently stolen a large amount of money from Rajakeshavadasa Dewanji's government and given it to the above-mentioned people, by writing false accounts and making up a false report that they were trying to subjugate Travancore. He had Veluthampi Dalavapurva, the murderer and supreme traitor who had become Sarvadhi, executed him on the banks of Alappuzha on charges of treason and had him executed in a most brutal manner. Due to his hatred, various tricks were continuously used to prevent him from paying the above-mentioned fourteen lakh rupees. Finally, this debt was recorded in the Travancore government.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "On the 10th day of the 979th year of the Vrischikam, he submitted the money due to the government to His Majesty Balarama Varma and reminded His Majesty that he was not obliged to receive it properly and that it was sufficient to settle the debts accumulated by standing as a surety for the government. In response to this, the Maharaja ordered the donor to pay the entire amount correctly from the money received from the government for each urgent need, and if he did not do so, it would be 'not enough for merit, the fruits of merit, and the deeds of his ancestors', and returned the documents and ordered Veluthampi a second time to pay the donor's money in full as soon as possible. (See paragraph 3 of the petition sent to the Governor of Madras).", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "But instead of carrying out the order, the brave Veluthampi ordered people to kill Mathutharakan at night without informing anyone. (See the petition) 5-00 2 Due to the continuous wars that were being waged with Tipu and others, the entire treasury of Travancore was depleted and it became difficult to run the state administration, he joined the great sovereigns of that time, Jayanthan Namboori, the great general Thakkala Sakaranarayanan Chetty, and during the recent Great War, considering the need for war, the British Government and the Travancore Government", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Mathootharaka also tried to collect a certain amount of debt, similar to the war debt he had tried to collect from the Christians and their churches. But the remaining debt he had to collect was from the Christians and their churches.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "983 -Mandan", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The gist of a letter sent by Mathu Arakan Karnal Makkali on the 25th of the month of Idava is as follows: ' ' I have taken twenty-two thousand rupees from the Syrian churches on the pretext of giving it to the King of Travancore. I have taken another twenty-two thousand rupees to give to Sampratipilla. Before that, I had taken twenty-two thousand rupees from the churches on the pretext of giving it to the King of Cochin. In addition to these, I have also exerted influence from the Syrian nobles. I have not received any result so far. But I have not taken a single rupee from the churches in Travancore and Cochin. I have not taken anything from the churches for Sampratipilla. I have not taken any money from the Syrian Mappilas. Therefore, with the grace of the Sai Babas, the people of the church and I should be brought before them and saved by knowing the truth. Similarly, the previous ", "i": false, "b": false}, {"t": "\"slanderous accusations against me by some people in the presence of the Sai Babas\"", "i": true, "b": false}, {"t": " were also brought to the fore to prove the truth. Similarly, the Sai Babas themselves will also be brought to the fore to prove the truth of this.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Although Marakan, who was a former enemy of Veluthampi, betrayed Tharakan to help the Travancore government, tried to get money in this way, Pan not only made this an opportunity but also cut it off. Finally, in 1976, the Punjanattu people persuaded Tharakan to cut off both his ears and, as a testimony that there was no quarrel, insult or anything in the month of Shishika, Thampuran made two ears with gold with his mind and gave them to Mathutharakan as a token of respect on the 27th.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Veluthampi, who had been appointed by the Maharaja, did not implement any of the decisions that were made in his favor regarding Tarakan, and instead created necessary obstacles to prevent them from being implemented.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "It was Mathurakan who advised Rajakesavadas Diwanji that Alappuzha was a suitable place for a port and that if it were made a port, then the trade there - and the trade in Central Travancore in general - would flourish and he was the one who made all the necessary plans for it. The knowledge and experience he had gained from sailing and exploring foreign ports and their berths enabled Tarakan to give expert advice. This matter", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The real name of the stream from Alappuzha toll plaza to Kadappuram is 'Maathutharakan Tothi'.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The story may be new to many. The first person to build a bridge over that stream was a man named Varki. Since he was an employee of Tharakan, Tharakan himself used to work there and named the bridge 'Kannan Varkippala'.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "There is an old song about the trade in the Aiyads in Alappuzha. I am also very grateful to Mr. K. John, Assistant Commissioner of Excise, Maveli, for kindly telling me this song as long as I can remember. The song goes like this: -", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "\"A man named Mathutharakan, who was a theatre man in Alappuzha, had a grove of trees cut down and a tree cut down on both sides, and in the market, he went to the market with a scythe, sixty wheels of a balance, seventy wheels of a balance, and a scythe.", "i": true, "b": false}]}, {"type": "break"}, {"type": "p", "runs": [{"t": "When I went before the officials, they started to tremble.", "i": false, "b": false}]}, {"type": "break"}, {"type": "p", "runs": [{"t": "The moustache caught fire, the cucumber fence caught fire, and the cucumber tree reached the village...", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The Thampuran of Kochi also received information that Mathutharakan was encouraging Karthikathirunal Maharaja to do something against the kingdom of Cochin. Shaktan Thampuran had decided to teach the famous Sakthan Tharakan a good lesson in this matter. When he was coming to the village of Menovil near Irinjalakuda, he unexpectedly met Tharak and his entourage. ", "i": false, "b": false}, {"t": "\"Oh, little Mathutharakan! I heard that you have also recently come to Masuri. I also know that most of the people have come to Pushta. Come closer. Let me see your back. I know that you are coming to the back of the house or not. Let me see,\"", "i": true, "b": false}, {"t": " he ordered. ", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The cunning Tharaka decided that the king had used such a trick to create a reason for him to be killed by showing his back to the king and insulting him. There is a story that the wise man immediately, without any hesitation, prostrated himself on the floor in front of the king and showed his back. The powerful Tharaka, being very pleased with the king's wisdom and intelligence, said, ", "i": false, "b": false}, {"t": "\"Very well. I will take a quarter of the money if you bow down and fall down.\"", "i": true, "b": false}, {"t": " He presented the sword that was drawn in his hand to Tharaka.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "On the occasion of the Karthika festival, the great warrior, Sakthi, with his mind, ascended to the Aluva palace and stayed there.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "They accepted the hospitality of the king and spent several days together. All these days the two monks used to play the four-ring chess game together. When it was time for the afternoon tea, they would stop the game they were playing, cover the ten-ring board and the dice with a large cloth, and after taking the nectar, return home and continue the game.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Since both the Venerables had engaged in the game with great care, long deliberation, and meticulousness, both of them had devoted a great deal of time to casting each of their pieces. Since both of them were anxious that it would be better if they could play without losing, and since it was not in their best interest to withdraw without knowing the outcome, the game continued for several more days.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Although Rajakesavadas' letters were received by His Majesty during this period, indicating that it would be good if His Majesty could reach Thiruvananthapuram as soon as possible on the occasion of Karthika Thirunal, the plan to travel to Thiruvananthapuram, which had been left unfinished, was not fully implemented.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Mathutharakan, with the knowledge of Keshavadas Diwanji, arrived at Aluva one day at noon, thinking that the Maharaja was entangled in the Chaturanga war with his mind and that his golden lord would not be able to win since the Shaktan was in his mind. ", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Realizing that both of them had stopped playing and were marching for the same purpose, Tharakan, in the guise and appearance of a foolish Namboori, went to the place where the chessboard was placed and very humbly requested some of the servants who were waiting there, who were waiting for the chessboard covered with tar from both sides, that he had never seen the chesscock before, and that he should show them the birds.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "No matter how much they said that they were not chickens, but that the chessmen were just wooden sticks, 'Tarakan Namburi' would not agree. He kept repeating the nonsense that they were just chickens and kept taking out the ring that was lying in the sand and throwing it 23 times. So, a man from Sakthan Thirumana's side who was guarding the chessboard raised it and showed it to him. Tarakan Namburi, acting embarrassed about his own stupidity and loss, walked out of there.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Mathutharaka immediately changed his disguise, returned with Sakthan Thirumeni, who had returned after the Amrit, and approached the presence of his food provider, the Maharaja, who had come forward. He bowed down very humbly and said with determination, 'The elephant has fetched a good price. If there is an order to sell it, it will be good. It is difficult to save everything else.' The Maharaja replied that he would agree to his request without even a moment's hesitation, he immediately entered the ravine where Tharakan had dug.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The two kings reached the playing ground and continued the game. The Maharaja of Travancore took his elephant and jumped onto the spot where Shaktan had struck the sacred stone. With the joy of victory, Shaktan struck the elephant and then, as one or two of his arms pushed each other, his god was in great danger and he was defeated.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Sakthan Thampuran later realized that it was Mathutharakan's great cunning that enabled him to achieve victory on Karthika Thiru Naal by deliberately giving up the elephant to the opposition, and so he conducted a thorough investigation into the matter after returning to Tripunithura.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The present Kottayam Thiruvarpku temple was built in the early days, but it was dilapidated and decayed, so as per the orders of the Maharaja, it was Mathuthakan who had it built a second time. The temple was built by Mathuthakan, the owner, who lived in the hillock of the first temple and built a building on it. After the construction was completed, Mathuthakan donated an eighty-ten-storied 'Kambakal Ottuvilakku' to the temple. 7", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "This lamp stands in front of the temple, as if it were an eternal memorial to Mathutharakan the tycoon.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Just as Tharak had Kuthiyathod and Alappuzha, there were also shops in Champakulam. The present Champakulam was located in a large pond facing the north of the English School, where some of Tharak's wooden baskets were kept. On every occasion when Tharak would come to Champakulam, a few black stone steps were built on one side of the pond, which were specially made in a fire so that he could sit and bathe. Some of these seem to have now been made into the stone steps of the school.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Mathutharakan's main trade was with the East India Company. It is well known that the warships used by the British in the naval war with Napoleon were all built from timber purchased by the company from Tarkan. In the same year, 603, all the silks and gems purchased from the Chellam area for the needs of the Travancore royal family and the Sree Padmanabhaswamy temple and which were placed before the Maharaja by 60,000 nobles and ambitious people were purchased from Mathutharakan.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Mathutharaka, a great millionaire, community leader, valiant, intelligent, royal servant, and extremely powerful, was a tycoon. 7", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "This lamp stands in front of the temple, as if it were an eternal memorial to Mathutharakan the tycoon.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Just as Tharak had Kuthiyathod and Alappuzha, there were also shops in Champakulam. The present Champakulam was located in a large pond facing the north of the English School, where some of Tharak's wooden baskets were kept. On every occasion when Tharak would come to Champakulam, a few black stone steps were built on one side of the pond, which were specially made in a fire so that he could sit and bathe. Some of these seem to have now been made into the stone steps of the school.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Mathutharakan's main trade was with the East India Company. It is well known that the warships used by the British in the naval war with Napoleon were all built from timber purchased by the company from Tarkan. In the same year, 603, all the silks and gems purchased from the Chellam area for the needs of the Travancore royal family and the Sree Padmanabhaswamy temple and which were placed before the Maharaja by 60,000 nobles and ambitious people were purchased from Mathutharakan.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Mathutharaka, a great millionaire, community leader, valiant, intelligent, royal servant, and extremely powerful, was a tycoon. 7", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "As mentioned in the Malankara Syrian Church History, a case was made against the then president of the Malankara Syrian Church, the great Mar Dionysius. All his assets were confiscated, all the gold ornaments were melted down and stolen, the church properties were confiscated and looted, and the Metropolitan was imprisoned in a prison guarded by archers so that not even a drop of water could be touched. In order to scare the Metropolitan by saying that the tundish was hidden, the madaba, the courtyard, the tombs and the church grounds of the old church at Chengannur were ransacked, and the houses of the Nazarenes in Puthan Kavil and Chengannur were searched. The tyrant, who had been imprisoned and sealed, had committed all the most vile and despicable acts against the Metropolitan that a supreme authority could commit, in a most despicable and despicable manner.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "As a result of this insult to the innocent Metropolitan and making him drink tears, the traitor suffered the same experiences in the same degree. His body, his property, his family, and his lineage were destroyed and reduced to ashes. The great Metropolitan Dionysius, like a bird escaping from the trap of the king and flying into the sky, escaped from all the traps and ascended to the throne with health, wealth, good fortune, and good reputation", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "If it is true that history repeats itself, if there is any truth in it, then we too must learn many lessons from these events. The great Nasrani people, the contemporaries of Mathutharakan, saw firsthand the suffering of Tharak, the exile, the famine, the genocide, the suffering of the Metropolitan and his great sacrifice. Time is the unblemished judge who brings to light the true deeds and the true deeds of all. *", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "It is said that in the year 946, when Mathutharaka's mother was dying, the woman gave her son the two horoscopes written and entrusted to her by both the lords. In order to see if there was any good fortune in the latter part of Tharaka's life, Tharaka went to the Alangattu Palace and the Anantham Kodungallur Palace with those horoscopes and had them examined by the experts in horology who were also there at that time.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "It is said that Kunju Panicker served as Tharakan's loyal servant and confidant until his death, and that Panicker became very wealthy because of Tharakan. Legend has it that Tharakan's moustache touched his.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Some of the obstacles faced during the logging of timber from the banks of Periyar where some Nair elders have said that thinking that the deity of a famous temple was angry, Tharakan prepared a series of white vessels measuring up to fifteen feet, including Uzhakku, Uri, Nazhi, Edangazhi, Ranidangazhi, and Munnidangazhi, and offered them to the temple, and with that, all obstacles were removed.", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "The Maharaja's 'golden horn' was kept in the Thiruvananthapuram palace for a long time. It is also said that when the temple sleepers woke up in the morning, the gold-bearers of the Tharakan would only come out after seeing the Sri Krishna statue and the horn. There are two versions of the story: that the gold horn, which was thus connected to Kulasekha Rapperumal Thirumeni by the owner of the Thachi Mathutharakan, was kept in the Chellam property along with the golden kadali of Chinnathambi Marakar, the son of Pokkumussa Marakar, along with bananas, or that Ayilyam Thirunal Maharaja melted it down to make ornaments and some of these ornaments were somehow kept in the expensive Ezhava houses in Thiruvananthapuram. Who knows the truth? ", "i": false, "b": false}]}, {"type": "p", "runs": [{"t": "Note - It is also stated here that Mathutharakan's father's name was Itty, that the deceased was in Karimbavala, Chailolla, Veeyapuram, that the amount given as a dowry was five thousand, ten thousand, that Tharakan's mother was in Thathampally when Mappila and his wife took Mariyakutty, and that there are differences of opinion - (K.M. V)", "i": false, "b": false}]}];

function runsToHTML(runs){
  return runs.map(r=>{
    let t = r.t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    if (r.i) t = '<em>'+t+'</em>';
    if (r.b) t = '<strong>'+t+'</strong>';
    return t;
  }).join('');
}
function tokenize(runs){ // -> [{t, i, b}] word tokens keeping spaces
  const toks=[];
  for (const r of runs){
    const parts = r.t.split(/(\s+)/);
    for (const p of parts) if (p!=='') toks.push({t:p, i:r.i, b:r.b});
  }
  return toks;
}
function toksToRuns(toks){
  const out=[];
  for (const tk of toks){
    const last=out[out.length-1];
    if (last && last.i===tk.i && last.b===tk.b) last.t+=tk.t;
    else out.push({t:tk.t, i:tk.i, b:tk.b});
  }
  return out;
}

  meas.innerHTML='<div class="page-inner"><div class="runhead"></div><div class="pgbody"></div></div>';
  document.body.appendChild(meas);
  const inner = meas.firstChild.lastChild;
  const outer = meas.firstChild;
  
  const pages=[]; let cur=[];
  const fits=()=>outer.scrollHeight<=outer.clientHeight;

  function flush(){ if(cur.length){ pages.push(cur.join('')); cur=[]; inner.innerHTML=''; } }

  for (const block of BOOK){
    if (block.type==='break'){
      const h='<p class="brk">&#10041;&#10041;&#10041;</p>';
      inner.insertAdjacentHTML('beforeend',h);
      if(!fits()){ inner.lastChild.remove(); flush(); inner.insertAdjacentHTML('beforeend',h); }
      cur.push(h); continue;
    }
    let toks = tokenize(block.runs), cont=false;
    while (toks.length){
      const cls = cont ? ' class="cont"' : '';
      // try whole remainder
      const whole='<p'+cls+'>'+runsToHTML(toksToRuns(toks))+'</p>';
      inner.insertAdjacentHTML('beforeend',whole);
      if (fits()){ cur.push(whole); toks=[]; break; }
      inner.lastChild.remove();
      // binary search max tokens that fit
      let lo=0, hi=toks.length;
      while(lo<hi){
        const mid=Math.ceil((lo+hi)/2);
        const frag='<p'+cls+'>'+runsToHTML(toksToRuns(toks.slice(0,mid)))+'</p>';
        inner.insertAdjacentHTML('beforeend',frag);
        if (fits()) lo=mid; else hi=mid-1;
        inner.lastChild.remove();
      }
      if (lo===0){ flush(); cont=cont; continue; } // nothing fits on this page -> new page
      const frag='<p'+cls+'>'+runsToHTML(toksToRuns(toks.slice(0,lo)))+'</p>';
      inner.insertAdjacentHTML('beforeend',frag);
      cur.push(frag);
      toks=toks.slice(lo);
      while(toks.length && /^\s+$/.test(toks[0].t)) toks.shift();
      flush(); cont=true;
    }
  }
  flush();
  document.body.removeChild(meas);
  return pages;
}

// ---- build DOM pages ----
const pagesHTML = paginate();
const bookEl = document.getElementById('book');

function addPage(html, hard){
  const d=document.createElement('div');
  d.className='page'; if(hard) d.setAttribute('data-density','hard');
  d.innerHTML=html;
  bookEl.appendChild(d);
}
addPage('<div class="cover"><div><h2>'+TITLE+'</h2><div class="rule"></div>'+
        '<div class="sub">'+SUBTITLE+'</div>'+
        '<div class="author">K. M. Varghese</div>'+
        '<div class="orig">Translated from the Malayalam original &ldquo;Thachil Mathuttharakan&rsquo;s Thangakompan&rdquo; &middot; 1929</div></div>'+
        '<div class="hint">Click or swipe to turn the pages</div></div>', true);
pagesHTML.forEach((h,i)=>{
  const head = (i % 2 === 0)
    ? '<div class="runhead show">The Golden Horn</div>'
    : '<div class="runhead"></div>';
  addPage('<div class="page-inner">'+head+h+'<div class="pagenum">'+(i+1)+'</div></div>', false);
});
addPage('<div class="endpage">&#10041;&nbsp; The End &nbsp;&#10041;<br><br>Preserved with love by the Powathikunnel family</div>', true);

// ---- init flip ----
const pageFlip = new St.PageFlip(bookEl, {
  width: PAGE_W, height: PAGE_H, size: 'stretch',
  minWidth: 280, maxWidth: 560, minHeight: 390, maxHeight: 780,
  maxShadowOpacity: 0.5, showCover: true, mobileScrollSupport: false, usePortrait: true
});
pageFlip.loadFromHTML(document.querySelectorAll('#book .page'));

const counter=document.getElementById('counter');
function upd(){
  counter.textContent = 'Page ' + (pageFlip.getCurrentPageIndex()+1) + ' of ' + pageFlip.getPageCount();
}
pageFlip.on('flip', upd); upd();
document.getElementById('prev').onclick=()=>pageFlip.flipPrev();
document.getElementById('next').onclick=()=>pageFlip.flipNext();
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')pageFlip.flipPrev();
  if(e.key==='ArrowRight')pageFlip.flipNext();
});
</script>
